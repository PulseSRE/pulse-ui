apiVersion: v1
kind: Namespace
metadata:
  name: shiftops
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: shiftops
  namespace: shiftops
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: shiftops-cluster-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
- kind: ServiceAccount
  name: shiftops
  namespace: shiftops
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shiftops
  namespace: shiftops
  labels:
    app: shiftops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shiftops
  template:
    metadata:
      labels:
        app: shiftops
    spec:
      serviceAccountName: shiftops
      containers:
      - name: shiftops
        image: shiftops:latest
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: shiftops
  namespace: shiftops
  labels:
    app: shiftops
spec:
  selector:
    app: shiftops
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: shiftops
  namespace: shiftops
  labels:
    app: shiftops
spec:
  to:
    kind: Service
    name: shiftops
  port:
    targetPort: 8080
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
