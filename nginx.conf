worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path /tmp/proxy_temp;
    fastcgi_temp_path /tmp/fastcgi_temp;
    uwsgi_temp_path /tmp/uwsgi_temp;
    scgi_temp_path /tmp/scgi_temp;

    server {
        listen 8080;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # Gzip compression
        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml;

        # Proxy Kubernetes API requests using the pod's service account token
        location /api/kubernetes/ {
            proxy_pass https://kubernetes.default.svc/;
            proxy_ssl_verify off;
            proxy_set_header Authorization "Bearer $sa_token";
            proxy_set_header Accept application/json;
            proxy_read_timeout 120s;
        }

        # Proxy Prometheus API
        location /api/prometheus/ {
            proxy_pass https://thanos-querier.openshift-monitoring.svc:9091/;
            proxy_ssl_verify off;
            proxy_set_header Authorization "Bearer $sa_token";
            proxy_read_timeout 60s;
        }

        # Proxy Alertmanager API
        location /api/alertmanager/ {
            proxy_pass https://alertmanager-main.openshift-monitoring.svc:9094/;
            proxy_ssl_verify off;
            proxy_set_header Authorization "Bearer $sa_token";
            proxy_read_timeout 60s;
        }

        # SPA fallback — serve index.html for all non-file routes
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
