<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
      <defs>
        <linearGradient id="pulse-grad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#3b82f6"/>
          <stop offset="100%" style="stop-color:#8b5cf6"/>
        </linearGradient>
      </defs>
      <!-- Circle background -->
      <circle cx="50" cy="50" r="46" fill="url(#pulse-grad)" opacity="0.15"/>
      <circle cx="50" cy="50" r="46" fill="none" stroke="url(#pulse-grad)" stroke-width="2.5"/>
      <!-- Heartbeat/pulse line -->
      <polyline 
        points="10,50 25,50 32,50 38,30 44,70 50,20 56,80 62,35 68,50 75,50 90,50" 
        fill="none" 
        stroke="url(#pulse-grad)" 
        stroke-width="3.5" 
        stroke-linecap="round" 
        stroke-linejoin="round"
      />
      <!-- Small sparkle dots -->
      <circle cx="50" cy="20" r="2" fill="#3b82f6" opacity="0.6"/>
      <circle cx="56" cy="80" r="1.5" fill="#8b5cf6" opacity="0.5"/>
    </svg>
